# Built-in model catalog for localvision.
#
# All URLs point at the project's HuggingFace namespace (huggingface.co/froggeric)
# so we control availability and quantization choices.
#
# v0.2.0 catalog — based on the v6 benchmark (30 images, 3 runs, hybrid scoring).
# Three models covering the full hardware range:
#
#   * Qwen3.5 4B (nothink) — constrained tier fallback (4–8 GB Macs)
#   * Qwen3-VL 8B (Q8)     — constrained tier preferred (12–16 GB Macs)
#   * Qwen3.6 27B (nothink) — mainstream tier (24+ GB Macs)
#
# Key v6 finding: hybrid thinking models (Qwen3.5/3.6) are strictly better
# with enable_thinking=false for vision tasks. The chat_template_kwargs field
# below carries this per-model.
#
# SHA256 fields computed 2026-06-21 from the local GGUF files used in the
# v6 benchmark. These must match the files uploaded to HuggingFace.

# Catalog schema version. Increment when adding/removing/renaming fields.
# Loader rejects incompatible versions with a clear upgrade message.
schema_version = 1

# =============================================================================
# Constrained tier: <= 16 GB unified memory.
# Two models — Q3VL-8B-Q8 is preferred (better quality), Q3.5-4B is the
# fallback when Q3VL-8B doesn't fit (8 GB Macs).
# =============================================================================

[models.qwen3-vl-8b]
display_name = "Qwen3-VL 8B (Q8_0)"
gguf = "https://huggingface.co/froggeric/Qwen3-VL-8B-Instruct-GGUF/resolve/main/Qwen3-VL-8B-Instruct-Q8_0.gguf"
mmproj = "https://huggingface.co/froggeric/Qwen3-VL-8B-Instruct-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "0d264b3941185d00a74f75c4245521dae088ff1efc90ab8d1754e83f5844adb0"
mmproj_sha256 = "d406d03ebabefdef86a2c86bf0c1b65f9e046f7a81c218f25de4931b46a07fc4"
ctx = 32768
gpu_layers = -1
min_vram_gb = 6
min_system_ram_gb = 12
released = "2025-10"
license = "Apache-2.0"
preferred = true
preferred_for = [
  "read_image",
  "extract_text",
  "extract_code",
  "extract_table",
  "describe_ui",
  "describe_diagram",
  "describe_chart",
  "diagnose_error",
  "compare_images",
]
hardware_tier = "constrained"
bench_toks = 38.0
notes = "The only 100%-reliable Q8 model in our v6 benchmark (0 timeouts across 90 cells, σ=0.33). Strict win over its Q4 version (+1.3 pts, lower variance). Default for 12–16 GB Macs."

[models."qwen3.5-4b"]
display_name = "Qwen3.5 4B (nothink)"
gguf = "https://huggingface.co/froggeric/Qwen3.5-4B-GGUF/resolve/main/Qwen3.5-4B-Q4_K_M.gguf"
mmproj = "https://huggingface.co/froggeric/Qwen3.5-4B-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "00fe7986ff5f6b463e62455821146049db6f9313603938a70800d1fb69ef11a4"
mmproj_sha256 = "cd88edcf8d031894960bb0c9c5b9b7e1fea6ebee02b9f7ce925a00d12891f864"
ctx = 32768
gpu_layers = -1
min_vram_gb = 3
min_system_ram_gb = 8
released = "2026-03"
license = "Apache-2.0"
preferred = false
preferred_for = ["read_image"]
hardware_tier = "constrained"
bench_toks = 52.0
notes = "Best quality-per-GB in the v6 benchmark (23.6 pts/GB — 75.5/100 at 3.2 GB). Used automatically on 4–8 GB Macs where Qwen3-VL 8B doesn't fit. Must run with enable_thinking=false for vision (chat_template_kwargs below)."
chat_template_kwargs = { enable_thinking = false }

