# Built-in model catalog for localvision.
#
# All URLs point at the project's HuggingFace namespace (huggingface.co/froggeric)
# so we control availability and quantization choices.
#
# v0.5.1 catalog — qwen3-vl-8b (Q8) is the default for ALL tools wherever it
# fits. A re-analysis of the v6 benchmark (quality + speed together) picked the
# 8B-Q8 as the best all-round model: it is the only 100%-reliable Q8 in the
# study (0 timeouts, σ=0.33), scores 74.4/100 (within ~5 pts of the 27B
# champion's 79.6), and is ~3× faster (26 s vs 70 s per image). Three models:
#
#   * Qwen3-VL 8B (Q8)      — DEFAULT for every tool, where it fits (~12 GB+ Macs)
#   * Qwen3.5 4B (nothink)  — fallback where the 8B does not fit (4–8 GB Macs)
#   * Qwen3.6 27B (nothink) — opt-in, max quality via `--model qwen3.6-27b`
#
# Selection: only the 8B lists tools in preferred_for, so the per-tool selector
# picks the 8B everywhere it fits and falls back to the 4B on tiny hardware.
# The 27B is never auto-selected; it is retained for power users who want the
# last 5 quality points and pass --model explicitly.
#
# Key v6 finding: hybrid thinking models (Qwen3.5/3.6) are strictly better
# with enable_thinking=false for vision tasks. The chat_template_kwargs field
# below carries this per-model.
#
# SHA256 fields computed 2026-06-21 from the local GGUF files used in the
# v6 benchmark. These must match the files uploaded to HuggingFace.

# Catalog schema version. Increment when adding/removing/renaming fields.
# Loader rejects incompatible versions with a clear upgrade message.
schema_version = 1

# =============================================================================
# Qwen3-VL 8B (Q8) — the default for every tool, where it fits.
# Listed for all tools (preferred_for) and marked preferred so both the per-tool
# selector and the generic default land on it. Fits from ~12 GB up.
# =============================================================================

[models.qwen3-vl-8b]
display_name = "Qwen3-VL 8B (Q8_0)"
gguf = "https://huggingface.co/froggeric/Qwen3-VL-8B-Instruct-GGUF/resolve/main/Qwen3-VL-8B-Instruct-Q8_0.gguf"
mmproj = "https://huggingface.co/froggeric/Qwen3-VL-8B-Instruct-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "0d264b3941185d00a74f75c4245521dae088ff1efc90ab8d1754e83f5844adb0"
mmproj_sha256 = "d406d03ebabefdef86a2c86bf0c1b65f9e046f7a81c218f25de4931b46a07fc4"
ctx = 32768
gpu_layers = -1
min_vram_gb = 6
min_system_ram_gb = 12
released = "2025-10"
license = "Apache-2.0"
preferred = true
preferred_for = [
  "read_image",
  "read_document",
  "extract_text",
  "describe_chart",
  "extract_table",
  "image_to_prompt",
  "compare_images",
]
hardware_tier = "mainstream"
bench_toks = 38.0
notes = "Default for most tools and the safest all-rounder. The only 100%-reliable Q8 model in our v6 benchmark (0 timeouts across 90 cells, σ=0.33). A re-analysis (quality + speed) made it the pick over the 27B champion: within ~5 pts on quality but ~3× faster (26 s vs 70 s) and rock-solid. v0.7 per-tool routing: the 8B-Q8 is the benchmark-best for read_image / extract_text / describe_chart / extract_table (+ the newer read_document / image_to_prompt / compare_images); the 4B-Q8 takes extract_code / describe_ui / describe_diagram / diagnose_error where it edges the 8B. See BENCHMARK-REPORT-v5.md."

