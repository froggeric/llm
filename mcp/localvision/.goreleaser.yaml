# .goreleaser.yaml for localvision.
#
# IMPORTANT: This config lives in the subdirectory (mcp/localvision/)
# on purpose, because localvision has its own go.mod and is released
# independently from the rest of the monorepo. Run goreleaser from inside
# the subdirectory:
#
#	cd mcp/localvision && goreleaser release --snapshot --clean
#
# Tag convention: mcp/localvision/v0.1.0  (Go subdirectory module
# convention; this is what `go install` looks up on proxy.golang.org).

version: 2

# goreleaser auto-detects the module path from go.mod. There is no
# top-level `module:` field in v2; the project name below is purely for
# artifact naming.
project_name: localvision

# NOTE: We deliberately do NOT add `go mod tidy` as a before-hook here.
# go.mod is locked at the Phase 0 contract commit and tracks become
# responsible for adding to it explicitly. The pre-tidy behaviour would
# strip dependencies that other tracks haven't imported yet from go.mod /
# go.sum, breaking the locked-deps invariant. `go mod verify` is safe and
# is enough to catch a corrupted module cache.
before:
  hooks:
    - go mod verify

gomod:
  proxy: true
  mod: mod

builds:
  - id: localvision
    main: ./cmd/localvision
    binary: localvision
    # v0.1 MVP: darwin/arm64 only. The other targets are listed as comments
    # so that enabling them in v0.2 is a one-line change per target.
    goos:
      - darwin
      # - linux    # v0.2
      # - windows  # v0.2
    goarch:
      - arm64
      # - amd64    # v0.2
    # CGO off for the wrapper binary. The wrapper never does inference
    # itself; it spawns llama-server as a subprocess. (The llama-server
    # binary itself is built by scripts/build-llama-cpp.sh and shipped as
    # a separate release asset, with Metal / CUDA / etc. enabled as
    # appropriate per target.)
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/froggeric/llm/mcp/localvision/internal/version.Version={{.Version}}
      - -X github.com/froggeric/llm/mcp/localvision/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/froggeric/llm/mcp/localvision/internal/version.BuildDate={{.Date}}
    mod_timestamp: "{{.CommitTimestamp}}"

archives:
  - id: default
    ids:
      - localvision
    # Keep archive names simple and predictable so install.sh can compute
    # the URL from `uname -s` + `uname -m`.
    name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "darwin" }}darwin{{ else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "arm64" }}arm64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - COMMERCIAL-LICENSING.md
      - THIRD_PARTY_LICENSES.md

# SHA256 sidecar per archive; install.sh verifies against this.
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  # Disable auto-generated GitHub release notes; CHANGELOG.md is the source
  # of truth. We still let goreleaser create the release; we just don't let
  # it overwrite our body.
  disable: false
  draft: false
  prerelease: auto
  name_template: "localvision {{.Version}}"
  header: |
    ## localvision {{.Version}}

    See [CHANGELOG.md](./CHANGELOG.md) for the full list of changes.

    ### Install

    ```bash
    curl -fsSL https://github.com/froggeric/llm/releases/{{.Tag}}/download/install.sh | bash
    ```

    Or with Go installed:

    ```bash
    go install github.com/froggeric/llm/mcp/localvision/cmd/localvision@{{.Version}}
    ```
  footer: |
    ----
    Released by goreleaser from `mcp/localvision/.goreleaser.yaml`.
  # Ship the curl|sh installer as a top-level release asset so the README's
  # `latest/download/install.sh` URL resolves. The source lives at
  # scripts/install.sh; dist/ is regenerated by goreleaser and wiped on
  # each release, so it cannot be the source of truth.
  extra_files:
    - glob: ./scripts/install.sh
      name_template: install.sh

# Homebrew tap is a v0.2 deliverable. The CI workflow plumbs through
# HOMEBREW_TAP_GITHUB_TOKEN now so we don't have to touch the workflow
# again when we enable it.
brews: []
