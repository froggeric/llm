# Built-in model catalog for local-vision-mcp.
#
# All URLs point at the project's HuggingFace namespace (huggingface.co/froggeric)
# so we control availability and quantization choices.
#
# v0.1.0 ships with two models. Both are Qwen3-VL — Qwen's dedicated vision
# family, which led our 7-model benchmark on OCR accuracy and fine detail.
# Gemma 4 26B-A4B was considered but removed: in the head-to-head, Qwen3-VL 8B
# beat it on every category that matters (verbatim transcription, dense
# screenshots, bilingual OCR). "Bigger is not always better."
#
# SHA256 fields are real (computed Phase 3, 2026-06-18).
#
# Catalog schema version. Increment when adding/removing/renaming fields.
# Loader rejects incompatible versions with a clear upgrade message.
schema_version = 1

# =============================================================================
# Preferred model for "constrained" hardware (8-16 GB Macs)
# =============================================================================

[models.qwen3-vl-4b]
display_name = "Qwen3-VL 4B"
gguf = "https://huggingface.co/froggeric/Qwen3-VL-4B-Instruct-GGUF/resolve/main/Qwen3-VL-4B-Instruct-Q4_K_M.gguf"
mmproj = "https://huggingface.co/froggeric/Qwen3-VL-4B-Instruct-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "d4dcd426bfba75752a312b266b80fec8136fbaca13c62d93b7ac41fa67f0492b"
mmproj_sha256 = "1b9f4e92f0fbda14d7d7b58baed86039b8a980fe503d9d6a9393f25c0028f1fc"
ctx = 32768
gpu_layers = -1
min_vram_gb = 5
min_system_ram_gb = 8
released = "2025-10"
license = "Apache-2.0"
preferred = true
preferred_for = ["read_image"]
hardware_tier = "constrained"
bench_toks = 60.6
notes = "Fastest model in the catalog (60 tok/s on Apple M2 Max). Default for 8-16 GB Macs where the 8B doesn't fit comfortably. Same Qwen3-VL family as the 8B; quality close on simple images, drops on busy ones."

# =============================================================================
# Preferred model for "mainstream" and "high_end" hardware (16+ GB Macs)
# The default for the vast majority of users.
# =============================================================================

[models.qwen3-vl-8b]
display_name = "Qwen3-VL 8B"
