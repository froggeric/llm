# Built-in model catalog for local-vision-mcp.
#
# All URLs point at the project's HuggingFace namespace (huggingface.co/froggeric)
# so we control availability and quantization choices.
#
# SHA256 fields are placeholders until Phase 3, when the lead downloads each
# model file, hashes it, and commits the real values. Tools that try to load
# a model with placeholder SHA256 will fail validation.
#
# Catalog schema version. Increment when adding/removing/renaming fields.
# Loader rejects incompatible versions with a clear upgrade message.
schema_version = 1

# =============================================================================
# Preferred model for "constrained" hardware (8-16 GB Macs)
# =============================================================================

[models.qwen3-vl-4b]
display_name = "Qwen3-VL 4B"
gguf = "https://huggingface.co/froggeric/Qwen3-VL-4B-Instruct-GGUF/resolve/main/Qwen3-VL-4B-Instruct-Q4_K_M.gguf"
mmproj = "https://huggingface.co/froggeric/Qwen3-VL-4B-Instruct-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "d4dcd426bfba75752a312b266b80fec8136fbaca13c62d93b7ac41fa67f0492b"
mmproj_sha256 = "1b9f4e92f0fbda14d7d7b58baed86039b8a980fe503d9d6a9393f25c0028f1fc"
ctx = 32768
gpu_layers = -1
min_vram_gb = 5
min_system_ram_gb = 8
released = "2025-10"
license = "Apache-2.0"
preferred = true
preferred_for = ["read_image"]
hardware_tier = "constrained"
bench_toks = 60.6
notes = "Fastest model in the catalog. Use on 8 GB Macs where nothing else fits. Quality close to Qwen3-VL 8B on simple images."

