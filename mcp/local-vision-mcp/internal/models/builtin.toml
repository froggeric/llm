mmproj = "https://huggingface.co/froggeric/Qwen3-VL-8B-Instruct-GGUF/resolve/main/mmproj-F16.gguf"
gguf_sha256 = "108e7ff92b78eefd3db4741885104acba514255c11b617d3c7b197a5f46efe89"
mmproj_sha256 = "d406d03ebabefdef86a2c86bf0c1b65f9e046f7a81c218f25de4931b46a07fc4"
ctx = 32768
gpu_layers = -1
min_vram_gb = 8
min_system_ram_gb = 16
released = "2025-10"
license = "Apache-2.0"
preferred = true
preferred_for = [
  "read_image",
  "extract_text",
  "extract_code",
  "extract_table",
  "describe_ui",
  "describe_diagram",
  "describe_chart",
  "diagnose_error",
  "compare_images",
]
hardware_tier = "mainstream"
bench_toks = 43.0
notes = "Best all-rounder. Default for any Mac with >=16 GB unified memory. Won our 7-model benchmark on OCR accuracy, mixed-script text (read Chinese + Latin on the same image), and dense-screenshot extraction (got all 20 albums verbatim where Gemma 4 26B-A4B hallucinated 8 of them). 6 GB on disk."
