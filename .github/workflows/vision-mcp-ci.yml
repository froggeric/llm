# Continuous integration for the localvision subdirectory.
#
# Scope: this workflow ONLY runs when files under mcp/localvision/
# change. Python/Shell/Markdown changes elsewhere in the repo are covered
# by the existing ci.yml and never trigger this workflow, so they cannot
# break the Go build and vice versa.
#
# v0.4 matrix: Linux + Windows + macOS. With CGO off the code is pure Go, so
# the same `go vet` / `go test -race` / `go build` runs on all three to catch
# platform-specific regressions (build tags, syscall constants, path handling)
# and to exercise the Linux/Windows hardware-detection paths on real OSes.

name: vision-mcp-ci

on:
  push:
    branches: [main]
    paths:
      - 'mcp/localvision/**'
      - '.github/workflows/vision-mcp-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp/localvision/**'
      - '.github/workflows/vision-mcp-ci.yml'

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: vision-mcp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false # one OS failing shouldn't mask the others
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mcp/localvision

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache-dependency-path: mcp/localvision/go.sum

      - name: Print environment
        shell: bash
        run: |
          echo "go version: $(go version)"
          echo "GOOS=$(go env GOOS) GOARCH=$(go env GOARCH)"
          echo "module: $(head -1 go.mod)"

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race ./...

      - name: go build
        shell: bash
        run: |
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; fi
          mkdir -p bin
          go build -trimpath -o "bin/localvision${ext}" ./cmd/localvision
          "./bin/localvision${ext}" version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: localvision-${{ github.sha }}-${{ matrix.os }}
          path: mcp/localvision/bin/localvision*
          if-no-files-found: error
          retention-days: 7
