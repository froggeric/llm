# Release workflow for localvision.
#
# Triggers when a tag matching mcp/localvision/v* is pushed. This is
# the Go subdirectory-module convention; proxy.golang.org looks for tags in
# this format when resolving `go install ...@latest`.
#
# Runs on a single macos-14 runner. With CGO off the wrapper is pure Go, so
# goreleaser cross-compiles all six targets (darwin/linux/windows × arm64/amd64)
# from this one runner — no per-OS build matrix is needed for the release.
# Cross-platform *tests* run in vision-mcp-ci.yml on ubuntu/windows/macos.
#
# Required secrets:
#
#   GITHUB_TOKEN            Automatically provided by Actions; used by
#                           goreleaser to upload release assets.
#
#   HOMEBREW_TAP_GITHUB_TOKEN
#                           A fine-grained PAT with contents:write on
#                           froggeric/homebrew-tap, so goreleaser can push the
#                           formula update.

name: vision-mcp-release

on:
  push:
    tags:
      - 'mcp/localvision/v*'

# Release runs are not safe to race; never cancel a release in flight.
concurrency:
  group: vision-mcp-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # goreleaser needs to upload assets to the release.

jobs:
  release:
    name: goreleaser (cross-compile all targets)
    runs-on: macos-14
    defaults:
      run:
        working-directory: mcp/localvision

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history + tags to compute the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          cache-dependency-path: mcp/localvision/go.sum

      - name: Install goreleaser
        # Pin to a known-good major version; bump intentionally.
        run: |
          brew install goreleaser
          goreleaser --version

      - name: Normalize tag to plain semver for goreleaser
        # goreleaser OSS can't parse Go subdirectory-module tags
        # (mcp/localvision/v0.2.0). Create a local bare semver tag for it to
        # read and drop the subdir tag locally so it isn't picked instead. The
        # subdir tag stays on the remote for `go install`.
        run: |
          SUBDIR_TAG="${GITHUB_REF_NAME}"
          VERSION="${SUBDIR_TAG##*/}"   # mcp/localvision/v0.2.0 -> v0.2.0
          git tag "$VERSION"
          git tag -d "$SUBDIR_TAG"
          echo "Goreleaser will use tag: $VERSION"

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          goreleaser release --clean
